<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speechify Voice Studio</title>
  <link rel="stylesheet" href="sidepanel.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" x2="12" y1="19" y2="22"/>
          </svg>
        </div>
        <h1>Speechify <span>Studio</span></h1>
      </div>
      <div class="tagline">Your personal reading dashboard</div>
    </header>

    <!-- Currently Playing Area -->
    <section class="playback-monitor">
      <div class="section-title">Now Reading</div>
      <div class="reading-card" id="reading-card">
        <p class="reading-text" id="active-text">Select text on a webpage and right-click "Read selection with Speechify" to begin.</p>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progress-fill" style="width: 0%;"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 0 sentences</div>
      </div>
      
      <!-- Player Controls -->
      <div class="dashboard-controls">
        <button class="btn btn-ctrl" id="panel-skip-back" title="Previous Sentence">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="btn btn-ctrl btn-play-pulse" id="panel-play-pause" title="Play / Pause">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" id="panel-play-icon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="btn btn-ctrl" id="panel-skip-fwd" title="Next Sentence">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6zm9-12h2v12h-2z"/></svg>
        </button>
        <button class="btn btn-ctrl btn-stop" id="panel-stop" title="Stop">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
        </button>
      </div>
    </section>

    <!-- Speech Speed Settings -->
    <section class="settings-section">
      <div class="slider-header">
        <span class="section-title">Reading Speed</span>
        <span class="speed-val" id="panel-speed-val">1.0x</span>
      </div>
      <div class="slider-container">
        <span class="slider-label">Slower</span>
        <input type="range" class="speed-slider" id="panel-speed-slider" min="0.5" max="3.0" step="0.1" value="1.0">
        <span class="slider-label">Faster</span>
      </div>
    </section>

    <!-- Voice Selection Catalog -->
    <section class="catalog-section">
      <div class="section-title">Voice Catalog</div>
      
      <!-- Search and Filter Bar -->
      <div class="filter-bar">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="voice-search" placeholder="Search voices...">
        </div>
        
        <div class="lang-tabs" id="lang-tabs">
          <button class="tab-btn active" data-lang="all">All</button>
          <button class="tab-btn" data-lang="en">EN</button>
          <button class="tab-btn" data-lang="es">ES</button>
          <button class="tab-btn" data-lang="fr">FR</button>
          <button class="tab-btn" data-lang="de">DE</button>
          <button class="tab-btn" data-lang="it">IT</button>
        </div>
      </div>

      <!-- Scrollable voice card list -->
      <div class="voice-list" id="voice-list">
        <!-- Voice cards will be dynamically injected here -->
        <div class="loading-state">Loading voices...</div>
      </div>
    </section>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
